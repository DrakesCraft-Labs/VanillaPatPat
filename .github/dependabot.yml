version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "wednesday"
    open-pull-requests-limit: 1
    groups:
      gradle-all:
        patterns: ["*"]
    ignore:
      - dependency-name: "com.github.drakescraft_labs:*"
      - dependency-name: "net.endkind:*"
      - dependency-name: "gradle-wrapper"
      - dependency-name: "io.papermc.paper:paper-api"
      - dependency-name: "org.spigotmc:spigot-api"
      - dependency-name: "org.bukkit:bukkit"
